<!DOCTYPE html>
<html>
<head>
    <title>Shashank DevOps</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
        }

        h1 {
            font-size: 48px;
            color: #00d4ff;
            margin-bottom: 10px;
        }

        .role {
            font-size: 20px;
            color: #aaaaaa;
            margin-bottom: 40px;
        }

        .tools {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 40px;
        }

        .tool {
            background: rgba(0, 212, 255, 0.1);
            border: 2px solid #00d4ff;
            color: #00d4ff;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 16px;
        }

        .stats {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 40px;
        }

        .stat-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(0,212,255,0.3);
            border-radius: 15px;
            padding: 20px 30px;
        }

        .stat-box h2 {
            font-size: 36px;
            color: #00d4ff;
        }

        .stat-box p {
            font-size: 14px;
            color: #aaaaaa;
        }

        .footer {
            font-size: 14px;
            color: #666;
            margin-top: 20px;
        }

        .footer span { color: #00d4ff; }
    </style>
</head>
<body>

    <h1>Shashank Biradar</h1>
    <p class="role">DevOps Engineer</p>

    <div class="tools">
        <div class="tool">Jenkins</div>
        <div class="tool">Gradle</div>
        <div class="tool">GitHub</div>
        <div class="tool">Nginx</div>
        <div class="tool">NPM</div>
        <div class="tool">Git</div>
    </div>

    <div class="stats">
        <div class="stat-box">
            <h2>3</h2>
            <p>Pipelines Built</p>
        </div>
        <div class="stat-box">
            <h2>100%</h2>
            <p>Automated</p>
        </div>
        <div class="stat-box">
            <h2>CI/CD</h2>
            <p>Expert</p>
        </div>
    </div>

    <p class="footer">Auto deployed via <span>Jenkins + Gradle + Nginx</span> Pipeline</p>

</body>
</html>
